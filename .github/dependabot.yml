version: 2

updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'monthly'
      timezone: 'Europe/Berlin'

    open-pull-requests-limit: 1

    assignees:
      - 'centrifuge/apps'

    groups:
      monthly-minor-patch-updates:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
      major-updates:
        patterns:
          - '*'
        update-types:
          - 'major'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
      timezone: 'Europe/Berlin'

    open-pull-requests-limit: 1

    assignees:
      - 'centrifuge/apps'

    groups:
      github-actions-updates:
        patterns:
          - '*'
