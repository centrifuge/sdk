version: 2

updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'monthly'
      timezone: 'Europe/Berlin'

    open-pull-requests-limit: 1

    assignees:
      - 'centrifuge/apps'

    groups:
      monthly-updates:
        patterns:
          - '*'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
      timezone: 'Europe/Berlin'

    open-pull-requests-limit: 1

    assignees:
      - 'centrifuge/apps'

    groups:
      github-actions-updates:
        patterns:
          - '*'
