# Build, Test, and Report
name: Build, Test, and Report

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build-n-test:
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'

      - name: Enable Corepack and Set pnpm version
        run: |
          corepack enable
          corepack prepare pnpm@10.10.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Build
        run: pnpm build

      - name: Run unit tests
        run: pnpm test:unit

      # Integration tests (entity tests) require a Tenderly fork or local Anvil — not yet enabled in CI.
      # To re-enable later:
      # - name: Run integration tests
      #   run: pnpm test
      #   env:
      #     TENDERLY_ACCESS_KEY: ${{ secrets.TENDERLY_ACCESS_KEY }}
      #     PROJECT_SLUG: ${{ secrets.PROJECT_SLUG }}
      #     ACCOUNT_SLUG: ${{ secrets.ACCOUNT_SLUG }}
      #     DEBUG: ${{ github.run_attempt > 1 }}

      - name: Upload test results
        if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: |
            report/
            coverage/lcov-report/
          retention-days: 15

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          directory: ./coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          name: sdk-coverage
          fail_ci_if_error: false
